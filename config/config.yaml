# config/config.yaml

system:
  # SAFE MODE: If false, the agent will ONLY apply labels in Gmail.
  # If true, it will actually archive and move mail to the trash.
  enable_mutations: false

ingestion:
  # How many days of email to fetch in a single run
  days_per_batch: 7
  # Hard cap on emails fetched per run (safety valve for noisy weeks)
  max_fetch_per_run: 500
  # The maximum number of emails to process before pausing for review
  # (currently unused — becomes the review-queue pacing knob in Sprint 5)
  batch_size: 50

preferences:
  # The foundational taxonomy. The AI will use these to start,
  # but is allowed to suggest new ones dynamically.
  seed_interests:
    - "IT Delivery & Agile Management"
    - "AI Development & LLMs"
    - "Cloud Native Architecture"
    - "Terraform & IaC"
    - "LLMs and big laboratories"
    - "AI Agents"          # note: this was listed twice in your file — keep it once

entities:
  # Decision A: domain is identity. Decision C: exception lists override.
  # Senders from these domains are PEOPLE (identity = full email address)
  freemail_domains:
    - gmail.com
    - yahoo.com
    - outlook.com
    - hotmail.com
    - proton.me
  # Always SYSTEM, regardless of anything else
  system_domains:
    - github.com
    - atlassian.net
    - google.com        # calendar-notification@, drive-shares-noreply@ ...
    - docusign.net
  # Explicit person exceptions (work colleagues on corporate domains, etc.)
  person_emails:
    - someone@orange.com   # replace with real examples as you meet them

triage_filter:
  # Phase-1 free firewall. Substring match on the sender; an email whose
  # sender contains ANY of these is dropped as automated junk.
  junk_senders:
    - "no-reply"
    - "noreply"
    - "notifications@"
    - "do-not-reply"
    - "marketing"
    - "promotions"
    - "newsletter@"
    - "info@"             # WATCH: catches real humans at small firms — see Task 3.3
  # Regex patterns matched against the subject (case-insensitive).
  # Keep these as valid Python regex — they are compiled, not substring-matched.
  junk_subjects:
    - "out of office"
    - "jira\\]"          # note: \\ in YAML so the regex sees a literal \]
    - "reset your password"
    - "verify your email"
    - "security alert"
    - "meeting canceled"
    - "your receipt"
classifier:
  #location of file for prmmpt template
  classifier_prompt_template: "prompts/classify.md"
  # Model string confirmed in Session 0. One line to change when a model retires.
  model: "gemini-2.5-flash"        # or "gemini-3-flash" if Session 0 showed it works
  location: "global"
  # Judge gate: at or above this confidence -> auto-classified; below -> needs_review.
  # Start HIGH so you catch mistakes while correction history is thin. Relax later.
  confidence_threshold: 0.75
  # How many past corrections to inject into the prompt (Session 4 uses this).
  max_corrections_in_prompt: 15
  # Body excerpt length sent to the model.
  body_excerpt_chars: 1500
  # Categories the model must choose from. Seeded from your interests + operational buckets.
  categories:
    - "Delivery Escalation"        # critical work, needs attention
    - "Work - Routine"             # normal work traffic
    - "AI & LLMs"
    - "Cloud & Architecture"
    - "Learning Resource"          # courses, tutorials, Roblox dev, etc.
    - "Newsletter"
    - "Personal"
    - "Admin & Transactional"      # receipts, confirmations that survived the firewall
    - "Other"